<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Manager | Ensaios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body data-page="ensaios">
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__brand">
                <div class="brand-mark">CM</div>
                <div>
                    <strong>Click Manager</strong>
                    <span>Studio workspace</span>
                </div>
            </div>
            <nav class="sidebar__nav">
                <a class="nav-link" href="./dashboard.html">Dashboard</a>
                <a class="nav-link" href="./agenda.html">Minha Agenda</a>
                <a class="nav-link" href="./clientes.html">Clientes</a>
                <a class="nav-link is-active" href="./ensaios.html">Ensaios</a>
                <a class="nav-link" href="./dashboard.html#contratos">Contratos</a>
                <a class="nav-link" href="./dashboard.html#pagamentos">Pagamentos</a>
                <a class="nav-link" href="./portfolio.html">Portfólio</a>
                <a class="nav-link" href="./configuracoes.html">Configurações</a>
                <button class="nav-link nav-link--button" type="button" data-logout>Sair</button>
            </nav>
        </aside>

        <div class="app-content">
            <header class="topbar">
                <button class="menu-toggle" type="button" data-sidebar-toggle aria-label="Abrir menu">☰</button>
                <div>
                    <p class="eyebrow">Planejamento</p>
                    <h1>Ensaios</h1>
                </div>
                <button class="btn btn-primary" type="button" data-modal-open="sessionModal">Agendar ensaio</button>
            </header>

            <main class="page-stack">
                <section class="panel-card">
                    <div class="section-heading">
                        <div>
                            <p class="eyebrow">Filtro por data</p>
                            <h2>Agenda de sessões</h2>
                        </div>
                        <div class="filters">
                            <label class="field field-inline">
                                <span>De</span>
                                <input type="date" id="filterStart">
                            </label>
                            <label class="field field-inline">
                                <span>Até</span>
                                <input type="date" id="filterEnd">
                            </label>
                        </div>
                    </div>
                    <div id="sessionList" class="session-list"></div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal" id="sessionModal" aria-hidden="true">
        <div class="modal__backdrop" data-modal-close></div>
        <div class="modal__dialog">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Agenda</p>
                    <h3>Novo ensaio</h3>
                </div>
                <button class="icon-btn" type="button" data-modal-close aria-label="Fechar modal">✕</button>
            </div>
            <form id="sessionForm" class="modal-form" novalidate>
                <label class="field">
                    <span>Título</span>
                    <input type="text" name="title" placeholder="Ex.: Editorial no estúdio" required>
                </label>
                <label class="field">
                    <span>Cliente</span>
                    <input type="text" name="client" placeholder="Nome do cliente" required>
                </label>
                <label class="field">
                    <span>Data</span>
                    <input type="date" name="date" required>
                </label>
                <label class="field">
                    <span>Horário</span>
                    <input type="time" name="time" required>
                </label>
                <label class="field">
                    <span>Local</span>
                    <input type="text" name="location" placeholder="Local do ensaio" required>
                </label>
                <label class="field">
                    <span>Contrato vinculado</span>
                    <input type="text" name="contract" placeholder="Ex.: CTR-2026-001" required>
                </label>
                <label class="field">
                    <span>Valor do ensaio</span>
                    <input type="number" name="price" placeholder="Ex.: 1200" min="0" step="0.01" required>
                </label>
                <label class="field">
                    <span>Status do pagamento</span>
                    <select name="paymentStatus" required>
                        <option value="Pendente">Pendente</option>
                        <option value="Sinal recebido">Sinal recebido</option>
                        <option value="Pago">Pago</option>
                    </select>
                </label>
                <label class="field">
                    <span>Upload de imagens do ensaio</span>
                    <input type="file" name="images" accept="image/*" multiple>
                </label>
                <div class="modal-actions">
                    <button class="btn btn-ghost" type="button" data-modal-close>Cancelar</button>
                    <button class="btn btn-primary" type="submit">Agendar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/page-fallbacks.js"></script>
</body>
</html>
