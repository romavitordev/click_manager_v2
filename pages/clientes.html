<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Manager | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body data-page="clientes">
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__brand">
                <div class="brand-mark">CM</div>
                <div>
                    <strong>Click Manager</strong>
                    <span>Studio workspace</span>
                </div>
            </div>
            <nav class="sidebar__nav">
                <a class="nav-link" href="./dashboard.html">Dashboard</a>
                <a class="nav-link" href="./agenda.html">Minha Agenda</a>
                <a class="nav-link is-active" href="./clientes.html">Clientes</a>
                <a class="nav-link" href="./ensaios.html">Ensaios</a>
                <a class="nav-link" href="./dashboard.html#contratos">Contratos</a>
                <a class="nav-link" href="./dashboard.html#pagamentos">Pagamentos</a>
                <a class="nav-link" href="./portfolio.html">Portfólio</a>
                <a class="nav-link" href="./configuracoes.html">Configurações</a>
                <button class="nav-link nav-link--button" type="button" data-logout>Sair</button>
            </nav>
        </aside>

        <div class="app-content">
            <header class="topbar">
                <button class="menu-toggle" type="button" data-sidebar-toggle aria-label="Abrir menu">☰</button>
                <div>
                    <p class="eyebrow">Relacionamento</p>
                    <h1>Clientes</h1>
                </div>
                <button class="btn btn-primary" type="button" data-modal-open="clientModal">Adicionar cliente</button>
            </header>

            <main class="page-stack">
                <section class="panel-card">
                    <div class="section-heading">
                        <div>
                            <p class="eyebrow">Base ativa</p>
                            <h2>Lista de clientes</h2>
                        </div>
                        <span class="badge" id="clientCountBadge">0 clientes</span>
                    </div>

                    <div class="table-wrap">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Cliente</th>
                                    <th>Contato</th>
                                    <th>Tipo</th>
                                    <th>Status</th>
                                    <th>Último ensaio</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="clientTableBody"></tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal" id="clientModal" aria-hidden="true">
        <div class="modal__backdrop" data-modal-close></div>
        <div class="modal__dialog">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Cadastro</p>
                    <h3 id="clientModalTitle">Novo cliente</h3>
                </div>
                <button class="icon-btn" type="button" data-modal-close aria-label="Fechar modal">✕</button>
            </div>
            <form id="clientForm" class="modal-form" novalidate>
                <input type="hidden" name="clientId">
                <label class="field">
                    <span>Nome</span>
                    <input type="text" name="name" placeholder="Nome do cliente" required>
                </label>
                <label class="field">
                    <span>E-mail</span>
                    <input type="email" name="email" placeholder="cliente@email.com" required>
                </label>
                <label class="field">
                    <span>Tipo</span>
                    <select name="type" required>
                        <option value="Casamento">Casamento</option>
                        <option value="Família">Família</option>
                        <option value="Moda">Moda</option>
                        <option value="Corporativo">Corporativo</option>
                    </select>
                </label>
                <label class="field">
                    <span>Status</span>
                    <select name="status" required>
                        <option value="Ativo">Ativo</option>
                        <option value="Em negociação">Em negociação</option>
                        <option value="Pausado">Pausado</option>
                    </select>
                </label>
                <div class="modal-actions">
                    <button class="btn btn-ghost" type="button" data-modal-close>Cancelar</button>
                    <button class="btn btn-primary" type="submit">Salvar cliente</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/page-fallbacks.js"></script>
</body>
</html>
