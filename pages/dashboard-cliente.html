<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Manager | Dashboard do Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body data-page="client-dashboard">
    <main class="public-shell">
        <header class="portfolio-header">
            <a class="brand-pill" href="../index.html">Click Manager</a>
            <div class="portfolio-header__content">
                <p class="eyebrow">Área do cliente</p>
                <h1 id="clientDashboardTitle">Dashboard do Cliente</h1>
                <p id="clientDashboardSubtitle">Veja tudo que ainda depende de você em um único lugar.</p>
            </div>
        </header>

        <nav class="client-nav">
            <a class="client-nav__link is-active" href="./dashboard-cliente.html">Dashboard</a>
            <a class="client-nav__link" href="./meus-contratos.html">Meus Contratos</a>
            <a class="client-nav__link" href="./meus-ensaios.html">Meus Ensaios</a>
        </nav>

        <section class="content-grid">
            <article class="panel-card">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Pendências</p>
                        <h3>O que precisa da sua atenção</h3>
                    </div>
                </div>
                <div id="clientPendingList" class="stack-list"></div>
            </article>

            <article class="panel-card">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Resumo</p>
                        <h3>Situação do seu atendimento</h3>
                    </div>
                </div>
                <div id="clientSummaryList" class="stack-list"></div>
            </article>
        </section>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
