<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Manager | Galeria de Entrega</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body data-page="galeria">
    <main class="public-shell public-shell--delivery">
        <header class="delivery-header">
            <div>
                <p class="eyebrow">Galeria do cliente</p>
                <h1>Entrega | Casamento Marina & Lucas</h1>
                <p>Selecione suas fotos favoritas, acompanhe o total e finalize a compra das imagens extras.</p>
            </div>
            <div class="purchase-card">
                <span>Total selecionado</span>
                <strong id="selectedTotal">R$ 0,00</strong>
                <small id="selectedCount">0 fotos selecionadas</small>
                <div class="purchase-card__actions">
                    <button class="btn btn-secondary" type="button" id="buySelectedBtn">Comprar selecionadas</button>
                    <button class="btn btn-ghost" type="button" id="finalizeBtn">Finalizar compra</button>
                </div>
            </div>
        </header>

        <section class="gallery-grid" id="deliveryGrid" aria-label="Fotos da galeria de entrega"></section>
    </main>

    <div class="modal" id="purchaseModal" aria-hidden="true">
        <div class="modal__backdrop" data-modal-close></div>
        <div class="modal__dialog">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Pagamento</p>
                    <h3>Finalizar compra</h3>
                </div>
                <button class="icon-btn" type="button" data-modal-close aria-label="Fechar modal">✕</button>
            </div>
            <div class="checkout-box">
                <div class="checkout-row">
                    <span>Fotos selecionadas</span>
                    <strong id="checkoutQuantity">0</strong>
                </div>
                <div class="checkout-row">
                    <span>Total</span>
                    <strong id="checkoutTotal">R$ 0,00</strong>
                </div>
                <label class="field">
                    <span>Método de pagamento</span>
                    <select id="paymentMethod">
                        <option>Pix</option>
                        <option>Cartão de crédito</option>
                        <option>Boleto</option>
                    </select>
                </label>
                <button class="btn btn-primary btn-block" type="button" id="confirmPurchaseBtn">Finalizar compra</button>
                <p id="purchaseFeedback" class="purchase-feedback" aria-live="polite"></p>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
